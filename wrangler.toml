name = "xenoblade-100-tracker"
main = "worker.js"
compatibility_date = "2025-06-01"

# Static SPA lives in ./public and is served via the ASSETS binding.
# (Worker runs only for non-asset routes — leaves room for a future /api/* D1 sync layer.)
[assets]
directory = "./public"
binding = "ASSETS"

# ---- Cross-device sync (Cloudflare KV) -------------------------------------
# The /api/state endpoint in worker.js needs a KV namespace bound as SYNC.
# Until this is set up, sync just returns 503 and the app works fully offline.
#
# One-time setup (run in this repo, logged into the applelators account):
#   1) npx wrangler kv namespace create SYNC
#        → prints an id, e.g.  id = "abc123..."
#   2) uncomment the block below and paste that id
#   3) commit + push  (the Git-integration build picks up the binding)
#
[[kv_namespaces]]
binding = "SYNC"
id = "97a70cc7e1f34c87a2e3c5f105eae3ea"

# Deploy to the applelators Cloudflare account:
#   wrangler deploy
# Local preview:
#   wrangler dev      (or, with no wrangler installed: `python3 -m http.server` inside ./public)
