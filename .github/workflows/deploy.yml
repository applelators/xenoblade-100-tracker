name: Deploy to Cloudflare

# Auto-deploys the Worker + static assets on every push to main.
# Requires one repo secret: CLOUDFLARE_API_TOKEN
#   (Cloudflare dashboard → My Profile → API Tokens → Create Token →
#    "Edit Cloudflare Workers" template → scope to the applelators account.)
# Add it with:  gh secret set CLOUDFLARE_API_TOKEN

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Deploy
        run: npx --yes wrangler@latest deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
